name: Migrate gss-geo — campaign columns

# One-shot, manually-triggered migration that adds the campaign-tag columns
# (source / medium / campaign) to the shared gss-geo D1 database. Idempotent:
# re-running just reports "already exists" for columns that are present.
#
# Requires the CLOUDFLARE_API_TOKEN repo secret to include **Account · D1 · Edit**
# (the deploy token is Pages-only by default). Account + database IDs are already
# public in this repo (wrangler.toml / functions), so they're inlined here.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Add source/medium/campaign columns to hits
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCT: a32bba62c77df5e8f6bd33d04478ec34
          DB: fa0b2929-0086-479e-ae10-50509c34ebf8
        run: |
          set -euo pipefail
          fail=0
          for col in source medium campaign; do
            echo "== ALTER TABLE hits ADD COLUMN $col =="
            resp=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$ACCT/d1/database/$DB/query" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              --data "{\"sql\": \"ALTER TABLE hits ADD COLUMN $col TEXT NOT NULL DEFAULT '';\"}")
            echo "$resp"
            if echo "$resp" | grep -q '"success":true'; then
              echo "  -> added"
            elif echo "$resp" | grep -qi 'duplicate column'; then
              echo "  -> already exists, ok"
            else
              echo "  -> ERROR (not a duplicate-column case)"; fail=1
            fi
          done
          exit $fail
